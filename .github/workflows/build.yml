name: CI

on:
  pull_request:
    branches: [master]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check for build-relevant changes
        id: check
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$BASE" "$HEAD")
          if echo "$changed" | grep -qE \
            '^(src/|config/|gradle/|.*\.gradle$|gradle\.properties$|\.pre-commit-config.*\.yaml$|\.github/workflows/)'; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: [changes, pre-commit]
    if: needs.changes.outputs.build == 'true' && needs.pre-commit.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build
        run: ./gradlew build

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6.1.0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files

  ci:
    name: CI
    needs: [changes, build, pre-commit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed or skipped
        run: |
          [[ "${{ needs.changes.result }}" == "success" ]] || exit 1
          [[ "${{ needs.build.result }}" =~ ^(success|skipped)$ ]] || exit 1
          [[ "${{ needs.pre-commit.result }}" == "success" ]] || exit 1
