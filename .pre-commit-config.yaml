repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
        # neoforge.mods.toml uses Groovy ${} template syntax in keys;
        # it is not valid TOML until expanded by the build.
        exclude: '^src/main/resources/META-INF/neoforge\.mods\.toml$'
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-java

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint

  - repo: local
    hooks:
      - id: validate-gradle-wrapper
        name: Validate Gradle wrapper
        language: system
        entry: bash scripts/validate-gradle-wrapper.sh
        files: '^gradle/wrapper/'
        pass_filenames: false

      - id: test
        name: Unit tests
        language: system
        entry: ./gradlew test
        pass_filenames: false
        types: [java]

      - id: spotbugs
        name: SpotBugs
        language: system
        entry: ./gradlew spotbugsMain -Plint
        pass_filenames: false
        types: [java]

      - id: pmd
        name: PMD
        language: system
        entry: ./gradlew pmdMain
        pass_filenames: false
        types: [java]

      - id: errorprone
        name: Error Prone
        language: system
        entry: ./gradlew compileJava compileTestJava -Perrorprone
        pass_filenames: false
        types: [java]

      - id: owasp-dependency-check
        name: OWASP Dependency-Check
        language: system
        entry: ./gradlew dependencyCheckAnalyze
        pass_filenames: false
        stages: [manual]
