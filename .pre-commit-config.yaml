repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
        # neoforge.mods.toml uses Groovy ${} template syntax in keys;
        # it is not valid TOML until expanded by the build.
        exclude: '^src/main/resources/META-INF/neoforge\.mods\.toml$'
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-java

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
